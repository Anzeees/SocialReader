<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SocialReader - Inicio</title>
  <link rel="shortcut icon" href="./assets/logos/IconoSocialReader.png" type="image/x-icon">
  <link rel="stylesheet" href="./styles/index.css">
  <link rel="" href="">
</head>

<body>
  <script src="js/actions.js" defer></script>
  <div class="izq">
    <img src="assets/logos/IconoSocialReader.png" alt="">
  </div>
  <div class="main">
    <div class="formulario">
      <div class="titulo">
        <img src="assets/logos/IconoSocialReader.png">
        <h1>Únete a la lectura</h1>
      </div>
      <button class="google"><img src="assets/rs/google.png">Registrarse con Google</button>
      <button class="apple"><img src="assets/rs/apple.png">Registrarse con Apple</button>
      <button class="git"><img src="assets/rs/github.png">Registrarse con GitHub</button>
      <div class="separador">
        <span></span>
      </div>
      <button class="crear">Crear cuenta</button>
      <p>¿Ya tienes una cuenta?</p>
      <button class="login">Iniciar sesión</button>
    </div>
  </div>
  <div class="fondo"></div>
  <div class="formulario" id="crear-cuenta">
    <form action="" method="post">
    <div class="cerrar">
      <img src="assets/acciones/cerrar.png" alt="">
    </div>
    <div class="titulo">
      <img src="assets/logos/IconoSocialReader.png" alt="">
      <h1>SOCIAL READER</h1>
    </div>
      <input type="text" name="apodo" id="apodo" placeholder="Apodo" required>
      <input type="email" name="mail" id="mail" placeholder="Correo electrónico" required>
      <input type="password" name="contra" id="contra" placeholder="Contraseña" required>
      <input type="password" name="contra2" id="contra2" placeholder="Repetir contraseña" required>
      <br>
      <button type="submit" class="crear-boton">Crear cuenta...</button>
    </form>
  </div>
</body>

</html>
